name: Bug report
description: Report a reproducible VietArr bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste real API keys, passwords, tokens, cookies, or unredacted `.env` values.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact commands, clicks, URLs, or installer options.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: VietArr version or commit
      placeholder: v1.0.0 or git commit hash
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installer
        - Core API
        - Web Dashboard
        - Infuse/stream playback
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, browser/device, and network/DNS notes.
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Paste only redacted logs. Replace secrets with REDACTED.
      render: shell
