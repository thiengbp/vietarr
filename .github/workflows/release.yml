name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    name: Release checks
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish GitHub Release
    needs: checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer checksum
        run: |
          cd installer
          sha256sum vietarr.sh > vietarr.sh.sha256

      - name: Pack release source
        run: |
          git archive --format=tar.gz --output=vietarr-${GITHUB_REF_NAME}.tar.gz HEAD

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            installer/install.sh
            installer/vietarr.sh
            installer/vietarr.sh.sha256
            vietarr-${{ github.ref_name }}.tar.gz
