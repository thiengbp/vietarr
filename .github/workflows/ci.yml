name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  core:
    name: Core
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        working-directory: core
        run: npm ci

      - name: Check syntax
        working-directory: core
        run: npm run check

      - name: Test
        working-directory: core
        run: npm test

      - name: Audit high policy
        working-directory: core
        run: npm audit --omit=dev --audit-level=high

  web:
    name: Web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test
        working-directory: web
        run: npm test

      - name: Audit high policy
        working-directory: web
        run: npm audit --omit=dev --audit-level=high
